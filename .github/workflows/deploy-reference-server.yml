name: Deploy Reference Server

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'reference-server/**'
      - 'clients/typescript/**'
      - 'spec/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/build-deploy-package.sh'
      - '.github/workflows/deploy-reference-server.yml'

concurrency:
  group: deploy-reference-server-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Reference Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            spec/package-lock.json
            clients/typescript/package-lock.json
            reference-server/package-lock.json

      - name: Install and build spec
        working-directory: ./spec
        run: npm ci && npm run build

      - name: Install and build TypeScript client
        working-directory: ./clients/typescript
        run: npm ci && npm run build

      - name: Install and build reference server
        working-directory: ./reference-server
        run: npm ci && npm run build

      - name: Create deployment package
        run: ./scripts/build-deploy-package.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: reference-server-build
          path: reference-server-build.tar.gz
          retention-days: 1

  deploy-prod:
    name: Deploy to ozwell-prod refserver
    needs: build
    if: github.ref_name == 'main'
    # Placeholder pending Aaron's exact self-hosted runner labels.
    # Expected target server name from Aaron: ozwell-phxdc-node1.
    runs-on: [self-hosted, ozwell-phxdc-node1]

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-server-build

      - name: Prepare SSH host
        env:
          # Placeholder pending Aaron's exact deploy host value.
          # Aaron's build-dev.yaml pattern uses user@hostname; runner-local SSH may only need ozwell-phxdc-node1.
          DEPLOY_HOST: ${{ vars.OZWELL_REFSERVER_DEPLOY_HOST || 'ozwell-phxdc-node1' }}
        run: |
          set -euo pipefail
          if [[ -z "$DEPLOY_HOST" ]]; then
            echo "OZWELL_REFSERVER_DEPLOY_HOST is required (format: user@hostname or runner SSH host alias)"
            exit 1
          fi

          mkdir -p ~/.ssh

          deploy_hostname="${DEPLOY_HOST#*@}"
          ssh-keyscan "$deploy_hostname" >> ~/.ssh/known_hosts

      - name: Upload to server
        env:
          DEPLOY_HOST: ${{ vars.OZWELL_REFSERVER_DEPLOY_HOST || 'ozwell-phxdc-node1' }}
        run: rsync -ruva --progress reference-server-build.tar.gz "$DEPLOY_HOST:/tmp/"

      - name: Extract and restart service
        env:
          DEPLOY_HOST: ${{ vars.OZWELL_REFSERVER_DEPLOY_HOST || 'ozwell-phxdc-node1' }}
          # Placeholder path from Aaron; keep as a var so it can be changed without editing the workflow.
          DEPLOY_PATH: ${{ vars.OZWELL_REFSERVER_DEPLOY_PATH || '/storage/apps/ozwellai-api' }}
          # Placeholder pending Aaron's final service command: sudo systemctl vs systemctl --user.
          RESTART_COMMAND: ${{ vars.OZWELL_REFSERVER_RESTART_COMMAND || 'sudo systemctl restart refserver' }}
        run: |
          set -euo pipefail
          ssh "$DEPLOY_HOST" "DEPLOY_PATH='$DEPLOY_PATH' RESTART_COMMAND='$RESTART_COMMAND' bash -s" <<'REMOTE'
            set -euo pipefail

            deploy_path="${DEPLOY_PATH:-/storage/apps/ozwellai-api}"
            case "$deploy_path" in
              "~") deploy_path="$HOME" ;;
              "~/"*) deploy_path="$HOME/${deploy_path#~/}" ;;
            esac

            mkdir -p "$deploy_path/reference-server"
            mkdir -p "$deploy_path/clients/typescript"
            mkdir -p "$deploy_path/spec"
            cd "$deploy_path"

            rm -rf reference-server/dist clients/typescript/dist spec/dist
            tar -xzf /tmp/reference-server-build.tar.gz

            cd reference-server
            npm ci --omit=dev

            touch .env
            if grep -q '^PORT=' .env; then
              sed -i 's/^PORT=.*/PORT=8000/' .env
            else
              printf '\nPORT=8000\n' >> .env
            fi

            eval "$RESTART_COMMAND"
            rm /tmp/reference-server-build.tar.gz
          REMOTE

  deploy-dev:
    name: Deploy to ozwell-dev2 refserver
    needs: build
    if: github.ref_name == 'dev'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: reference-server-build

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOSTNAME: ${{ vars.OZWELL_DEV2_HOST || 'ozwell-dev2.os.mieweb.org' }}
          DEPLOY_PORT: ${{ vars.OZWELL_DEV2_PORT || '2029' }}
        run: |
          set -euo pipefail
          if [[ -z "$SSH_PRIVATE_KEY" ]]; then
            echo "SSH_PRIVATE_KEY is required"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOSTNAME" >> ~/.ssh/known_hosts

      - name: Upload to dev2
        env:
          DEPLOY_HOSTNAME: ${{ vars.OZWELL_DEV2_HOST || 'ozwell-dev2.os.mieweb.org' }}
          DEPLOY_PORT: ${{ vars.OZWELL_DEV2_PORT || '2029' }}
          DEPLOY_USER: ${{ vars.OZWELL_DEV2_USER || 'adamerla' }}
        run: rsync -e "ssh -p $DEPLOY_PORT" -ruva --progress reference-server-build.tar.gz "$DEPLOY_USER@$DEPLOY_HOSTNAME:/tmp/"

      - name: Extract and restart dev2 refserver
        env:
          DEPLOY_HOSTNAME: ${{ vars.OZWELL_DEV2_HOST || 'ozwell-dev2.os.mieweb.org' }}
          DEPLOY_PORT: ${{ vars.OZWELL_DEV2_PORT || '2029' }}
          DEPLOY_USER: ${{ vars.OZWELL_DEV2_USER || 'adamerla' }}
          DEPLOY_PATH: ${{ vars.OZWELL_DEV2_DEPLOY_PATH || '/home/adamerla/ozwellai-api' }}
        run: |
          set -euo pipefail
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOSTNAME" "DEPLOY_PATH='$DEPLOY_PATH' bash -s" <<'REMOTE'
            set -euo pipefail

            deploy_path="${DEPLOY_PATH:-/home/adamerla/ozwellai-api}"
            cd "$deploy_path"

            rm -rf reference-server/dist clients/typescript/dist spec/dist
            tar -xzf /tmp/reference-server-build.tar.gz

            npm ci --omit=dev --workspace reference-server --include-workspace-root=false

            cd reference-server
            pm2 stop refserver || true
            pm2 delete refserver || true
            pm2 start npm --name refserver -- start
            pm2 save

            rm /tmp/reference-server-build.tar.gz
          REMOTE
